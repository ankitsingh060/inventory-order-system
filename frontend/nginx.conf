# ─── Nginx configuration for React SPA ───────────────────────────────────────
# This serves the production React build and proxies /api/* to the backend.
# React Router uses browser history (BrowserRouter), so every path must
# serve index.html and let React handle routing client-side.

server {
    listen 80;
    server_name _;

    # Root — where the React build output lives inside the container
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression — speeds up transfer of JS/CSS bundles
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # Cache static assets aggressively (hashed filenames from CRA)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — any unknown path serves index.html so React Router works
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN"           always;
    add_header X-Content-Type-Options "nosniff"        always;
    add_header X-XSS-Protection "1; mode=block"        always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
